name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          generate_release_notes: false
          body: |
            ## Installation

            **Manual installation (before official Obsidian directory listing):**

            1. Download `main.js`, `manifest.json`, and `styles.css` from the Assets below
            2. Create a folder `obsidian-minddock` in your Obsidian vault's `.obsidian/plugins/` directory
            3. Copy the three files into that folder
            4. Restart Obsidian → Settings → Community Plugins → Enable MindDock
            5. Paste your API token from [app.minddock.network](https://app.minddock.network) → Settings → API Tokens

            See the [README](https://github.com/MindDockNetwork/obsidian-minddock#readme) for full instructions.
