name: Bug Report
description: Something is not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "e.g. 0.1.0-beta"
    validations:
      required: true

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: "e.g. 1.7.4"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe what went wrong and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a note
        2. Right-click → Dock to MindDock
        3. ...
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console errors (optional)
      description: |
        Open the developer console (Ctrl+Shift+I / Cmd+Option+I) and paste any errors here.
      render: shell

  - type: input
    id: account-tier
    attributes:
      label: MindDock account tier
      placeholder: "trial / personal / pro / business"
